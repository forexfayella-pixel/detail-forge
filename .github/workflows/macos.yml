name: macOS build

# Runs ONLY on version tags, published releases, or manual dispatch — never on every commit.
# (GitHub bills macOS runner minutes at 10x on private repos.)
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write          # needed to publish the installer to a GitHub Release on a tag

jobs:
  build-macos:
    runs-on: macos-14          # Apple silicon; the universal build cross-compiles the x86_64 slice
    steps:
      - uses: actions/checkout@v4

      # Faust is NOT needed: Source/generated/ClipEngine.h is committed and the Faust architecture
      # headers are vendored under ThirdParty/faust. Node is NOT needed: the UI is committed HTML +
      # the JUCE JS bundle. So this job has no toolchain install step beyond what the runner ships.

      - name: Version string
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then V="${GITHUB_REF_NAME#v}"; else V="0.0.1-dev.${GITHUB_RUN_NUMBER}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Do we have signing secrets?
        id: sign
        run: |
          if [ -n "${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}" ] && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "have=true"  >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Apple signing secrets set — producing UNSIGNED artifacts for testing."
          fi

      - name: Configure
        run: cmake -B build -G Xcode -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build (AU + VST3 + Standalone, Release, universal)
        run: cmake --build build --config Release --target DetailForge_All -j3

      - name: Locate artefacts
        id: art
        run: |
          VST3="$(find build -type d -name 'Detail Forge.vst3' | head -1)"
          AU="$(find build -type d -name 'Detail Forge.component' | head -1)"
          echo "vst3=$VST3" >> "$GITHUB_OUTPUT"
          echo "au=$AU"     >> "$GITHUB_OUTPUT"
          test -n "$VST3" && test -n "$AU"

      - name: Validate with pluginval
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -q pluginval.zip
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 8 --validate "${{ steps.art.outputs.vst3 }}"

      - name: Validate the AU with auval
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "${{ steps.art.outputs.au }}" ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2
          auval -v aufx Dtfg Fyla     # type=effect, subtype=PLUGIN_CODE, manufacturer=PLUGIN_MANUFACTURER_CODE

      # ---------- optional: sign + notarize (only if Apple secrets are configured) ----------
      - name: Import signing certificates
        if: steps.sign.outputs.have == 'true'
        env:
          APP_CERT:       ${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          INSTALLER_CERT: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_P12_BASE64 }}
          CERT_PASSWORD:  ${{ secrets.CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"; KPW="ci-temp-$RANDOM"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$APP_CERT" | base64 --decode > app.p12
          security import app.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          if [ -n "$INSTALLER_CERT" ]; then
            echo "$INSTALLER_CERT" | base64 --decode > installer.p12
            security import installer.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/productsign
          fi
          security set-key-partition-list -S apple-tool:,apple: -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f app.p12 installer.p12

      - name: Sign, package (.pkg), notarize, staple
        if: steps.sign.outputs.have == 'true'
        env:
          TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          VERSION:            ${{ steps.ver.outputs.version }}
        run: |
          APP_ID="$(security find-identity -v -p codesigning | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          INST_ID="$(security find-identity -v | grep 'Developer ID Installer' | head -1 | awk '{print $2}')"
          for b in "${{ steps.art.outputs.vst3 }}" "${{ steps.art.outputs.au }}"; do
            codesign --force --deep --options runtime --timestamp \
                     --entitlements packaging/entitlements.mac.plist -s "$APP_ID" "$b"
            codesign --verify --strict --verbose=2 "$b"
          done
          mkdir -p dist pkgroot/Library/Audio/Plug-Ins/VST3 pkgroot/Library/Audio/Plug-Ins/Components
          cp -R "${{ steps.art.outputs.vst3 }}" pkgroot/Library/Audio/Plug-Ins/VST3/
          cp -R "${{ steps.art.outputs.au }}"   pkgroot/Library/Audio/Plug-Ins/Components/
          pkgbuild --root pkgroot --identifier com.fayella.detailforge --version "$VERSION" \
                   --install-location / "dist/DetailForge-unsigned.pkg"
          productsign --sign "$INST_ID" "dist/DetailForge-unsigned.pkg" "dist/DetailForge-$VERSION.pkg"
          rm -f "dist/DetailForge-unsigned.pkg"
          xcrun notarytool submit "dist/DetailForge-$VERSION.pkg" \
                --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "dist/DetailForge-$VERSION.pkg"

      # ---------- fallback: UNSIGNED installer (.pkg) so the build is still usable for testing ----------
      # No Apple certs → the .pkg is unsigned. macOS Gatekeeper will warn; right-click → Open to bypass.
      - name: Build unsigned .pkg
        if: steps.sign.outputs.have != 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist pkgroot/Library/Audio/Plug-Ins/VST3 pkgroot/Library/Audio/Plug-Ins/Components
          cp -R "${{ steps.art.outputs.vst3 }}" pkgroot/Library/Audio/Plug-Ins/VST3/
          cp -R "${{ steps.art.outputs.au }}"   pkgroot/Library/Audio/Plug-Ins/Components/
          pkgbuild --root pkgroot --identifier com.fayella.detailforge --version "$VERSION" \
                   --install-location / "dist/DetailForge-$VERSION.pkg"

      # ---------- wrap the .pkg in a .dmg (mount, then double-click the .pkg to install) ----------
      # Runs for both signed and unsigned paths; both produce dist/DetailForge-<version>.pkg.
      - name: Wrap .pkg in a .dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PKG="$(ls dist/DetailForge-*.pkg 2>/dev/null | head -1)"
          test -n "$PKG" || { echo "::error::no .pkg found to wrap"; exit 1; }
          STAGE="$(mktemp -d)"
          cp "$PKG" "$STAGE/"
          hdiutil create -volname "Detail Forge $VERSION" -srcfolder "$STAGE" \
                         -ov -format UDZO "dist/DetailForge-$VERSION.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: DetailForge-macOS-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: error

      # ---------- on a version tag, publish the installer to a GitHub Release (permanent download link) ----------
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          SIGNED: ${{ steps.sign.outputs.have }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            NOTE='Signed & notarized macOS installer (.pkg inside .dmg). Universal (Intel + Apple Silicon). Mount the .dmg and run the .pkg — installs VST3 + AU.'
          else
            NOTE='Unsigned macOS installer (.pkg inside .dmg). Universal (Intel + Apple Silicon), installs VST3 + AU. Gatekeeper will warn on an unsigned installer: right-click the .pkg and choose Open, or run  xattr -dr com.apple.quarantine <file>  first.'
          fi
          gh release create "${{ github.ref_name }}" dist/*.dmg dist/*.pkg \
            --title "Detail Forge $VERSION" --notes "$NOTE" \
          || gh release upload "${{ github.ref_name }}" dist/*.dmg dist/*.pkg --clobber
