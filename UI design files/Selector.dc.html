<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;gap:5px;width:100%;user-select:none;-webkit-user-select:none;">
  <div style="font:600 9px/1 ui-sans-serif,system-ui,'SF Pro Display','Segoe UI',sans-serif;letter-spacing:1.4px;color:#8A939C;text-transform:uppercase;">{{ label }}</div>
  <div style="display:flex;gap:3px;padding:3px;background:#0E1013;border:1px solid #262A30;border-radius:7px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);">
    <sc-for list="{{ segs }}" as="seg" hint-placeholder-count="3">
      <button onClick="{{ onPick }}" data-opt="{{ seg.label }}" style="{{ seg.style }}">{{ seg.label }}</button>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:56},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;VOICING&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;options&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[&quot;Tube&quot;,&quot;Tape&quot;,&quot;Xfmr&quot;],&quot;tsType&quot;:&quot;string[]&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tube&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#8FD9E6&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onChange&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(v:string)=&gt;void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const opts = this.props.options || [];
    const value = this.props.value;
    const accent = this.props.accent ?? '#8FD9E6';
    const glow = this.hexA(accent, 0.30);
    const base = 'flex:1;min-width:0;border:none;cursor:pointer;padding:6px 2px;border-radius:5px;font:600 10px/1 ui-sans-serif,system-ui,\'SF Pro Display\',\'Segoe UI\',sans-serif;letter-spacing:0.4px;text-transform:uppercase;transition:all .12s ease;font-variant-numeric:tabular-nums;';
    const segs = opts.map((o) => {
      const active = String(o) === String(value);
      const style = active
        ? base + `background:linear-gradient(180deg,#2C3138,#1B1E23);color:${accent};box-shadow:0 0 0 1px ${this.hexA(accent,0.55)},0 0 10px ${glow},inset 0 1px 0 rgba(255,255,255,0.06);`
        : base + 'background:transparent;color:#6B747D;';
      return { label: String(o), style };
    });
    return {
      label: this.props.label ?? '', segs,
      onPick: (e) => { const v = e.currentTarget.dataset.opt; this.props.onChange && this.props.onChange(v); }
    };
  }
  hexA(hex, a) {
    const h = (hex || '#8FD9E6').replace('#', '');
    const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }
}
</script>
</body>
</html>
